site_name: Aurigraph SDK Documentation
site_url: https://sdk.aurigraph.io
site_description: Official documentation for the Aurigraph Developer Toolkit & SDK
site_author: Aurigraph DLT Corp
repo_url: https://github.com/Aurigraph-DLT-Corp/Aurigraph-Developer-Toolkit-and-SDK
repo_name: Aurigraph-DLT-Corp/Aurigraph-Developer-Toolkit-and-SDK
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started:
      - Overview: getting-started.md
      - Registration: registration.md
      - Authentication: authentication.md
      - Sandbox: sandbox.md
  - Core Concepts:
      - Handshake Protocol: handshake-protocol.md
      - Asset-Agnostic Design: asset-agnostic-design.md
      - Tier System: tier-system.md
      - Multi-Channel Architecture: multi-channel.md
      - GDPR Compliance: gdpr-compliance.md
      - GraphQL Gateway: graphql.md
      - Error Handling: error-handling.md
      - Policies: policies.md
  - SDKs:
      - Java: sdks/java.md
      - TypeScript: sdks/typescript.md
      - Python: sdks/python.md
      - Rust: sdks/rust.md
  - API Reference:
      - Overview: api-reference/README.md
  - Architecture:
      - GraphQL Migration: architecture/graphql-migration.md
  - Migration:
      - v1.x → v2.0: migration/v1-to-v2.md

copyright: >
  Copyright &copy; 2025-2026 Aurigraph DLT Corp
