# Aurigraph SDK — Continuous Integration
# Runs on every PR and push to main. Validates all SDK languages in parallel.
# ADTS-9: CI/CD Pipeline
# Security: No untrusted input is used in run: commands.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build:
    name: Java SDK
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: java/pom.xml

      - name: Compile
        run: mvn -B compile

      - name: Test
        run: mvn -B test

  typescript-build:
    name: TypeScript SDK
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  python-build:
    name: Python SDK
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Type check
        run: mypy aurigraph_sdk

      - name: Lint
        run: ruff check .

