# Aurigraph Python SDK — PyPI Publishing (Trusted Publishers / OIDC)
# Package: aurigraph-sdk
# No token needed after initial PyPI Trusted Publisher setup.
# One-time setup: go to pypi.org/manage/project/aurigraph-sdk/settings/publishing/
#   and add a GitHub Actions trusted publisher for this repo + workflow file.
# ADTS-9: Automated release on version tag
# Security: No untrusted input is used in run: commands.

name: Release Python SDK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      id-token: write  # Required for PyPI Trusted Publishers (OIDC)
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
