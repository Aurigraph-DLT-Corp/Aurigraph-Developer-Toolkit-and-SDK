# Aurigraph Rust SDK — crates.io Publishing
# Secrets needed: CRATES_IO_TOKEN
# Note: Activate when rust/ directory is added to the repo.
# ADTS-9: Automated release on version tag
# Security: No untrusted input is used in run: commands.

name: Release Rust SDK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Test
        run: cargo test

      - name: Dry-run publish
        run: cargo publish --dry-run

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
